<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KounterPro - Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0D1A63 0%, #2845D6 100%);
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loader-text {
            color: white;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p class="loader-text">KounterPro</p>
    </div>

    <script>
        // Check if user is authenticated
        async function checkAndRedirect() {
            try {
                // Load Supabase client
                const { createClient } = window;
                
                // Wait for Supabase to load
                if (typeof window.supabaseClient === 'undefined') {
                    // If Supabase not loaded, check localStorage
                    const authToken = localStorage.getItem('sb-' + (window.SUPABASE_PROJECT_ID || '') + '-auth-token');
                    if (authToken) {
                        window.location.href = './src/pages/index.html';
                    } else {
                        window.location.href = './src/pages/login.html';
                    }
                    return;
                }

                // Get current session
                const { data } = await window.supabaseClient.auth.getSession();
                
                if (data?.session) {
                    // User is logged in, redirect to dashboard
                    window.location.href = './src/pages/index.html';
                } else {
                    // User is not logged in, redirect to login
                    window.location.href = './src/pages/login.html';
                }
            } catch (error) {
                console.error('Error checking auth:', error);
                // If error, default to login page
                window.location.href = './src/pages/login.html';
            }
        }

        // Start redirect after a short delay to ensure scripts are loaded
        window.addEventListener('load', checkAndRedirect);
        
        // Fallback redirect after 2 seconds
        setTimeout(() => {
            const authToken = localStorage.getItem('sb-' + (window.SUPABASE_PROJECT_ID || '') + '-auth-token');
            if (authToken) {
                window.location.href = './src/pages/index.html';
            } else {
                window.location.href = './src/pages/login.html';
            }
        }, 2000);
    </script>
</body>
</html>
