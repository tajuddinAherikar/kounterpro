<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - KounterPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="./styles/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <div class="logo-placeholder">
                <img src="../assets/kounter-pro-logo-sm.png" alt="" style="width: 100px;">
            </div>
            
            <h1 style="color: #0D1A63; margin-bottom: 8px;">Reset Password</h1>
            <p class="subtitle" style="color: #666; font-size: 13px; margin-bottom: 30px;">Enter your email to receive a reset link</p>
            
            <form id="forgotPasswordForm" class="login-form">
                <div class="login-form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        required
                        placeholder="Enter your email"
                        autocomplete="email"
                    >
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>

                <button type="submit" class="btn-login"><span class="material-icons">send</span> Send Reset Link</button>
            </form>

            <!-- Success Message -->
            <div id="successMessage" style="display: none; margin-top: 20px;">
                <div style="padding: 12px 16px; background-color: #dcfce7; border: 1px solid #86efac; border-radius: 6px; color: #166534; font-size: 14px;">
                    <strong>✓ Check your email!</strong>
                    <p style="margin: 8px 0 0 0;">We've sent a password reset link to your email. It expires in 24 hours.</p>
                </div>
            </div>
            
            <div class="login-footer" style="margin-top: 20px;">
                <p style="margin-bottom: 10px;">Remember your password? <a href="login.html" style="color: #2845D6; font-weight: 600; text-decoration: none;">Sign In</a></p>
                <small class="app-version">Version 1.0.5 | © 2026 KounterPro</small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./scripts/config.js"></script>
    <script src="./scripts/toast.js"></script>

    <script>
        // Initialize Supabase directly (don't load full auth.js to avoid session checks)
        const SUPABASE_URL = 'https://clmozxqbttzdzrqdtrgs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsbW96eHFidHR6ZHpycWR0cmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MTgxODAsImV4cCI6MjA4NjM5NDE4MH0.Jw9jZ7yAa0Ed8HegAqjBmCSFhtguN9imC6XDtpl0R3I';
        
        let supabaseClient = null;
        
        // Initialize Supabase
        if (typeof window.supabase !== 'undefined') {
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('✅ Supabase initialized for password reset');
            } catch (error) {
                console.error('❌ Error initializing Supabase:', error);
            }
        }

        // Handle forgot password form submission
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!supabaseClient) {
                showToast('Supabase not initialized', 'error');
                return;
            }

            const email = document.getElementById('email').value.trim();
            const form = document.getElementById('forgotPasswordForm');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const submitBtn = form.querySelector('button[type="submit"]');

            // Reset messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            // Validate email
            if (!email || !email.includes('@')) {
                errorMessage.textContent = 'Please enter a valid email address';
                errorMessage.style.display = 'block';
                return;
            }

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                // Construct redirect URL that works for both localhost and GitHub Pages
                // Get the base URL by removing the current page filename
                const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
                const redirectUrl = `${baseUrl}/reset-password.html`;
                
                console.log('Password reset redirect URL:', redirectUrl);

                // Send password reset email
                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: redirectUrl
                });

                if (error) {
                    console.log('Email not in system (security response)');
                }

                // Always show success message (don't reveal if email exists)
                successMessage.style.display = 'block';
                form.reset();
                showToast('If that email is registered, you\'ll receive a reset link', 'success');

            } catch (error) {
                console.error('Error requesting password reset:', error);
                errorMessage.textContent = 'An error occurred. Please try again.';
                errorMessage.style.display = 'block';
                showToast('An error occurred. Please try again.', 'error');
            } finally {
                // Re-enable submit button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        });

        console.log('✅ Forgot password page ready');
    </script>
</body>
</html>
