<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - KounterPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <div class="logo-placeholder">
                <img src="../assets/kounter-pro-logo-sm.png" alt="" style="width: 100px;">
            </div>
            <h1>Create Account</h1>
            <p class="subtitle">Start managing your business today</p>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            
            <!-- OAuth Section (Phase 1) - TEMPORARILY DISABLED FOR GITHUB PAGES -->
            <!-- Enable this when deployed to a dedicated domain -->
            <div class="oauth-section" style="display: none;">
                <button type="button" id="googleSignUpBtn" class="btn-oauth btn-google">
                    <svg class="oauth-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    <span>Sign Up with Google</span>
                </button>
                <div class="oauth-divider">
                    <span>Or continue with email</span>
                </div>
            </div>

            <form id="signupForm" class="login-form">
                <div class="login-form-group">
                    <label for="businessName">Business Name</label>
                    <input type="text" id="businessName" name="businessName" required 
                           placeholder="Enter your business name" minlength="2" maxlength="100">
                </div>
                
                <div class="login-form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" name="mobile" required 
                           placeholder="10-digit mobile number" pattern="[0-9]{10}" maxlength="10">
                </div>
                
                <div class="login-form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="Enter your email">
                </div>
                
                <div class="login-form-group">
                    <label for="password">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" required 
                               placeholder="At least 6 characters" minlength="6">
                        <span class="password-toggle-icon material-icons" onclick="togglePasswordVisibility('password', this)">visibility_off</span>
                    </div>
                </div>
                
                <div class="login-form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" required 
                               placeholder="Re-enter your password" minlength="6">
                        <span class="password-toggle-icon material-icons" onclick="togglePasswordVisibility('confirmPassword', this)">visibility_off</span>
                    </div>
                </div>
                
                <button type="submit" class="btn-login"><span class="material-icons">person_add</span> Create Account</button>
            </form>
            
            <div class="login-footer" style="margin-top: 20px;">
                <p style="margin-bottom: 10px;">Already have an account? <a href="login.html" style="color: #2845D6; font-weight: 600; text-decoration: none;">Sign In</a></p>
                <small class="app-version">Version 1.0.5 | © 2026 KounterPro</small>
            </div>
        </div>
    </div>

    <script src="../scripts/config.js"></script>
    <script src="../scripts/supabase.js"></script>
    <script src="../scripts/auth.js"></script>
    <script>
        // Handle signup form submission
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const businessName = document.getElementById('businessName').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMessage = document.getElementById('errorMessage');
            
            // Clear previous errors
            errorMessage.style.display = 'none';
            
            // Validate business name
            if (businessName.length < 2) {
                errorMessage.textContent = 'Business name must be at least 2 characters';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Validate mobile number
            if (!/^[0-9]{10}$/.test(mobile)) {
                errorMessage.textContent = 'Please enter a valid 10-digit mobile number';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Validate password match
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match';
                errorMessage.style.display = 'block';
                document.getElementById('confirmPassword').focus();
                return;
            }
            
            // Validate password strength
            if (password.length < 6) {
                errorMessage.textContent = 'Password must be at least 6 characters';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Show loading
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Creating account...';
            submitBtn.disabled = true;
            
            // Sign up with Supabase
            const result = await supabaseSignUp(email, password, businessName, mobile);
            
            if (result.success) {
                // Show success message
                alert('✅ Account created successfully!\n\nYou can now sign in with your credentials.');
                
                // Redirect to login
                window.location.href = 'login.html';
            } else {
                // Show error
                errorMessage.textContent = result.error || 'Failed to create account. Please try again.';
                errorMessage.style.display = 'block';
                
                // Shake animation
                const loginBox = document.querySelector('.login-box');
                loginBox.style.animation = 'shake 0.5s';
                setTimeout(() => {
                    loginBox.style.animation = '';
                }, 500);
                
                // Reset button
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        // Toggle password visibility
        function togglePasswordVisibility(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                iconElement.textContent = 'visibility';
            } else {
                input.type = 'password';
                iconElement.textContent = 'visibility_off';
            }
        }
    </script>
</body>
</html>
